services:
  - type: web
    name: bizai
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bizai-postgres
          property: connectionString

databases:
  - name: bizai-postgres
    plan: free
